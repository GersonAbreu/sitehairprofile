<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Hair - Seu Corte Favorito</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <h1>Studio Hair</h1>
            <ul>
                <li><a href="#home">Início</a></li>
                <li><a href="#servicos">Serviços</a></li>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="overlay">
            <h2>Transforme seu visual</h2>
            <p>Cortes modernos e estilo profissional</p>
            <a href="#contato" class="btn">Agendar</a>
        </div>
    </section>

    <section id="servicos" class="servicos">
        <h2>Serviços</h2>
        <div class="cards">
            <div class="card">
                <img src="image/cabelo1.png" />
                <h3>Corte</h3>
            </div>
            <div class="card">
                <img src="image/color.png" />
                <h3>Coloração</h3>
            </div>
            <div class="card">
                <img src="image/barba.png" />
                <h3>Barba</h3>
            </div>
        </div>
    </section>

    <section id="sobre" class="sobre">
        <div>
            <h2>Sobre nós</h2>
            <p>Somos especialistas em beleza e estilo há mais de 10 anos.</p>
        </div>
        <img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e" />
    </section>

    <section id="contato" class="contato">
        <h2>Contato</h2>
        <form>
            <input type="text" placeholder="Nome">
            <input type="email" placeholder="Email">
            <textarea placeholder="Mensagem"></textarea>
            <button type="submit">Enviar</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Studio Hair</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
